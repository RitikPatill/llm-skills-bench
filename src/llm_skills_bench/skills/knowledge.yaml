    expected_output: "A process has its own memory space while threads share memory within the same process."
    scoring_method: fuzzy
    difficulty: medium
    tags: [operating_systems, concurrency, computer_science]
    metadata:
      fuzzy_threshold: 80

  - task_id: knowledge_009
    skill: knowledge
    prompt_template: |
