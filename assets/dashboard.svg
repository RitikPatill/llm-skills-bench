<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" font-family="sans-serif">
  <!-- Background -->
  <rect width="600" height="400" fill="#ffffff" stroke="#dee2e6" stroke-width="1"/>

  <!-- Top bar -->
  <rect width="600" height="48" fill="#0d6efd"/>
  <text x="16" y="30" font-size="18" font-weight="bold" fill="#ffffff">LLM Skills Bench</text>

  <!-- Run selector -->
  <rect x="380" y="10" width="206" height="28" rx="4" fill="#ffffff" opacity="0.15" stroke="#ffffff" stroke-width="1"/>
  <text x="390" y="29" font-size="13" fill="#ffffff">gpt-4o — 2025-05-31 ▾</text>

  <!-- Left panel: Skill Radar -->
  <rect x="12" y="60" width="280" height="270" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="24" y="82" font-size="13" font-weight="bold" fill="#495057">Skill Radar</text>

  <!-- Pentagon radar chart (centred at 152,195) -->
  <g transform="translate(152,195)">
    <!-- Grid rings -->
    <polygon points="0,-90 85.6,-27.9 52.9,73 -52.9,73 -85.6,-27.9"
             fill="none" stroke="#ced4da" stroke-width="1"/>
    <polygon points="0,-60 57.1,-18.6 35.3,48.7 -35.3,48.7 -57.1,-18.6"
             fill="none" stroke="#ced4da" stroke-width="1"/>
    <polygon points="0,-30 28.5,-9.3 17.6,24.3 -17.6,24.3 -28.5,-9.3"
             fill="none" stroke="#ced4da" stroke-width="1"/>
    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="-90"          stroke="#adb5bd" stroke-width="1"/>
    <line x1="0" y1="0" x2="85.6" y2="-27.9"      stroke="#adb5bd" stroke-width="1"/>
    <line x1="0" y1="0" x2="52.9" y2="73"          stroke="#adb5bd" stroke-width="1"/>
    <line x1="0" y1="0" x2="-52.9" y2="73"         stroke="#adb5bd" stroke-width="1"/>
    <line x1="0" y1="0" x2="-85.6" y2="-27.9"     stroke="#adb5bd" stroke-width="1"/>
    <!-- Data polygon -->
    <polygon points="0,-75 70,-23 41,60 -44,60 -72,-23"
             fill="#0d6efd" fill-opacity="0.25" stroke="#0d6efd" stroke-width="2"/>
    <!-- Axis labels -->
    <text x="0"    y="-98"  text-anchor="middle" font-size="11" fill="#343a40">Coding</text>
    <text x="96"   y="-25"  text-anchor="start"  font-size="11" fill="#343a40">Reasoning</text>
    <text x="60"   y="89"   text-anchor="start"  font-size="11" fill="#343a40">Knowledge</text>
    <text x="-62"  y="89"   text-anchor="end"    font-size="11" fill="#343a40">Instruction</text>
    <text x="-98"  y="-25"  text-anchor="end"    font-size="11" fill="#343a40">Tool Use</text>
  </g>

  <!-- Score label -->
  <text x="152" y="352" text-anchor="middle" font-size="12" fill="#6c757d">Overall: 0.74</text>

  <!-- Right panel: Run History -->
  <rect x="304" y="60" width="284" height="160" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="316" y="82" font-size="13" font-weight="bold" fill="#495057">Run History</text>

  <!-- Table header -->
  <rect x="316" y="90" width="260" height="24" fill="#e9ecef" rx="2"/>
  <text x="326" y="107" font-size="12" font-weight="bold" fill="#495057">Run</text>
  <text x="480" y="107" font-size="12" font-weight="bold" fill="#495057">Overall</text>
  <text x="552" y="107" font-size="12" font-weight="bold" fill="#495057">Score</text>

  <!-- Row 1 -->
  <rect x="316" y="114" width="260" height="24" fill="#ffffff"/>
  <text x="326" y="131" font-size="11" fill="#212529">gpt-4o · 2025-05-31</text>
  <text x="480" y="131" font-size="11" fill="#212529">5/5</text>
  <text x="552" y="131" font-size="11" fill="#198754">0.74</text>

  <!-- Row 2 -->
  <rect x="316" y="138" width="260" height="24" fill="#f8f9fa"/>
  <text x="326" y="155" font-size="11" fill="#212529">claude-3-5-sonnet · 2025-05-30</text>
  <text x="480" y="155" font-size="11" fill="#212529">5/5</text>
  <text x="552" y="155" font-size="11" fill="#198754">0.71</text>

  <!-- Row 3 -->
  <rect x="316" y="162" width="260" height="24" fill="#ffffff"/>
  <text x="326" y="179" font-size="11" fill="#212529">gpt-4o-mini · 2025-05-29</text>
  <text x="480" y="179" font-size="11" fill="#212529">5/5</text>
  <text x="552" y="179" font-size="11" fill="#fd7e14">0.61</text>

  <!-- Row border lines -->
  <line x1="316" y1="114" x2="576" y2="114" stroke="#dee2e6" stroke-width="1"/>
  <line x1="316" y1="138" x2="576" y2="138" stroke="#dee2e6" stroke-width="1"/>
  <line x1="316" y1="162" x2="576" y2="162" stroke="#dee2e6" stroke-width="1"/>
  <line x1="316" y1="186" x2="576" y2="186" stroke="#dee2e6" stroke-width="1"/>

  <!-- Right panel: Model Comparison -->
  <rect x="304" y="232" width="284" height="98" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="316" y="254" font-size="13" font-weight="bold" fill="#495057">Model Comparison</text>

  <!-- Comparison table header -->
  <rect x="316" y="260" width="260" height="22" fill="#e9ecef" rx="2"/>
  <text x="326" y="276" font-size="11" font-weight="bold" fill="#495057">Skill</text>
  <text x="460" y="276" font-size="11" font-weight="bold" fill="#495057">gpt-4o</text>
  <text x="530" y="276" font-size="11" font-weight="bold" fill="#495057">claude-3-5</text>

  <!-- Comparison rows -->
  <text x="326" y="296" font-size="11" fill="#212529">Coding</text>
  <text x="460" y="296" font-size="11" fill="#198754">0.80</text>
  <text x="530" y="296" font-size="11" fill="#fd7e14">0.75</text>

  <text x="326" y="314" font-size="11" fill="#212529">Reasoning</text>
  <text x="460" y="314" font-size="11" fill="#fd7e14">0.70</text>
  <text x="530" y="314" font-size="11" fill="#198754">0.72</text>

  <!-- Dividers -->
  <line x1="316" y1="282" x2="576" y2="282" stroke="#dee2e6" stroke-width="1"/>
  <line x1="316" y1="300" x2="576" y2="300" stroke="#dee2e6" stroke-width="1"/>
  <line x1="316" y1="318" x2="576" y2="318" stroke="#dee2e6" stroke-width="1"/>

  <!-- Footer -->
  <rect y="372" width="600" height="28" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="300" y="390" text-anchor="middle" font-size="11" fill="#6c757d">LLM Skills Bench — local-first, zero database</text>
</svg>
